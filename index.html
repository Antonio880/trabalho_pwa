<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <title>CatálogoPRO</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>

<body>

  <header id="cabecalho">
    <div class="header-container">
      <div class="logo">
        <span class="logo-texto">Catálogo</span>
      </div>
      <button id="btn-adicionar" class="btn-primario">+ Adicionar Produto</button>
    </div>
  </header>

  <section id="hero">
    <div id="hero-bg"></div>
    <div id="hero-conteudo">
      <h1>Gerencie seu Catálogo</h1>
      <p>Adicione, edite e organize seus produtos com facilidade</p>
      <button class="btn-hero" id="btn-hero-adicionar">Começar agora</button>
    </div>
  </section>

  <section id="filtros">
    <div class="filtros-container">
      <input type="text" id="busca" placeholder="  Buscar produto por nome ou descrição..." autocomplete="off">
      <select id="filtro-categoria">
        <option value="">Todas as categorias</option>
        <option value="Eletrônicos">Eletrônicos</option>
        <option value="Roupas">Roupas</option>
        <option value="Alimentos">Alimentos</option>
        <option value="Outros">Outros</option>
      </select>
    </div>
  </section>

  <section id="catalogo">
    <div id="contador-resultados"></div>
    <div id="grid-produtos"></div>
    <p id="sem-produtos" class="oculto">Nenhum produto encontrado com esses filtros.</p>
  </section>

  <footer>
    <p>CatálogoPRO &copy; 2025 — Trabalho PWA</p>
  </footer>

  <div id="overlay-modal" class="oculto" role="dialog" aria-modal="true" aria-labelledby="modal-titulo">
    <div id="modal">
      <div class="modal-header">
        <h2 id="modal-titulo">Adicionar Produto</h2>
        <button id="btn-fechar-modal" class="btn-fechar" aria-label="Fechar modal">✕</button>
      </div>

      <form id="form-produto" novalidate>
        <input type="hidden" id="campo-id">

        <div class="campo">
          <label for="campo-nome">Nome do produto *</label>
          <input type="text" id="campo-nome" placeholder="Ex: Fone Bluetooth Pro" required>
        </div>

        <div class="linha-dupla">
          <div class="campo">
            <label for="campo-preco">Preço (R$) *</label>
            <input type="number" id="campo-preco" placeholder="0,00" min="0" step="0.01" required>
          </div>
          <div class="campo">
            <label for="campo-estoque">Estoque *</label>
            <input type="number" id="campo-estoque" placeholder="0" min="0" required>
          </div>
        </div>

        <div class="campo">
          <label for="campo-categoria">Categoria *</label>
          <select id="campo-categoria" required>
            <option value="">Selecione uma categoria...</option>
            <option value="Eletrônicos">Eletrônicos</option>
            <option value="Roupas">Roupas</option>
            <option value="Alimentos">Alimentos</option>
            <option value="Outros">Outros</option>
          </select>
        </div>

        <div class="campo">
          <label for="campo-imagem">URL da imagem</label>
          <input type="url" id="campo-imagem" placeholder="https://exemplo.com/imagem.jpg">
        </div>

        <div class="campo">
          <label for="campo-descricao">Descrição</label>
          <textarea id="campo-descricao" rows="3" placeholder="Descreva o produto..."></textarea>
        </div>

        <div class="modal-acoes">
          <button type="button" id="btn-cancelar" class="btn-secundario">Cancelar</button>
          <button type="submit" id="btn-salvar" class="btn-primario">Salvar produto</button>
        </div>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>

</html>
